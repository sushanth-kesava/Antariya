services:
  - type: web
    name: antariya-backend
    rootDir: backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # Frontend is hosted on Hostinger (static export). These origins are
      # allowed through CORS so the Hostinger site can call this backend.
      - key: FRONTEND_URL
        value: https://antariyaofficial.com,https://www.antariyaofficial.com
